<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap">
<title>ReadAloud Timer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--ink2:#4a4640;--ink3:#8a857e;--paper:#f5f1ea;--paper2:#ebe6dc;--accent:#c94f2a;--accent2:#e07040;--green:#2a6644;--border:#ccc7bc;--r:8px}
body{font-family:'Courier New',monospace;background:var(--paper);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{background:var(--ink);color:var(--paper);padding:14px 28px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{width:30px;height:30px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:15px;height:15px;fill:white}
.hdr h1{font-family:Georgia,serif;font-size:18px;font-weight:300}
.hdr p{font-size:8px;color:#777;text-transform:uppercase;letter-spacing:.1em;margin-top:1px}

/* Main layout: left text | right panel */
.main{display:flex;flex:1;overflow:hidden}

/* LEFT: reading area */
.left{flex:1;display:flex;flex-direction:column;border-right:1px solid #333;overflow:hidden;background:#111}
.left-label{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:#666;padding:10px 32px 6px;flex-shrink:0;background:#111}
textarea{flex:1;width:100%;background:#111;border:none;border-top:1px solid #333;color:#e8e4dc;font-family:'Lora',Georgia,serif;font-size:18px;padding:24px 32px;resize:none;outline:none;line-height:1.9}
textarea::placeholder{color:#444}
.rdisplay{display:none;flex:1;overflow-y:auto;background:#111;border-top:1px solid #333;padding:24px 32px;line-height:1.9;font-size:18px;word-break:break-word;color:#e8e4dc;font-family:'Lora',Georgia,serif}
.word{display:inline;border-radius:3px;padding:1px 2px}
.word.active{background:#c94f2a;color:#fff}
.word.done{color:#555}

/* RIGHT: controls */
.right{width:300px;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;padding:18px 20px;gap:16px}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat{background:var(--paper2);border:1px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center}
.sv{font-size:18px;font-weight:500;display:block;line-height:1}
.sl{font-size:7px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;display:block;margin-top:3px}

.sect-label{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);margin-bottom:5px}

.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ctrl-group label{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);display:block;margin-bottom:3px}
select{width:100%;background:white;border:1px solid var(--border);border-radius:5px;color:var(--ink);font-family:'Courier New',monospace;font-size:10px;padding:6px 8px;appearance:none;cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}

.speed-row{display:flex;align-items:center;gap:8px}
.speed-row label{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);white-space:nowrap}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.speed-val{font-size:10px;color:var(--ink2);min-width:28px;text-align:right}

.btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
button{border:1px solid var(--border);border-radius:var(--r);padding:10px 4px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.btn-play{background:var(--accent);color:white;border-color:var(--accent);font-weight:500}
.btn-play:hover:not(:disabled){background:var(--accent2)}
.btn-play:disabled{background:var(--border);border-color:var(--border);cursor:default}
.btn-pause{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-pause:hover:not(:disabled){background:var(--ink2)}
.btn-pause:disabled{opacity:.4;cursor:default}
.btn-stop{background:white;color:var(--ink)}
.btn-stop:hover:not(:disabled){background:var(--paper2)}
.btn-stop:disabled{opacity:.4;cursor:default}

/* Timer */
.timer{background:var(--ink);border-radius:var(--r);padding:14px 16px;display:none}
.timer.on{display:block}
.timer-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.timer-label{font-size:7px;text-transform:uppercase;letter-spacing:.12em;color:#666}
.timer-end{font-size:8px;color:#888}
.timer-cd{font-family:Georgia,serif;font-size:38px;font-weight:300;color:white;text-align:center;margin-bottom:8px;line-height:1}
.timer-prog{height:3px;background:#333;border-radius:2px;overflow:hidden}
.timer-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .8s linear}

.status{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--ink3);letter-spacing:.05em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.dot.playing{background:var(--green);animation:pulse 1.5s infinite}
.dot.paused{background:var(--accent2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.err{color:#92400e;font-size:10px;padding:7px 9px;background:#fff8ee;border:1px solid #e8d8a0;border-radius:5px;display:none}
.err.on{display:block}

hr{border:none;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><svg viewBox="0 0 16 16"><path d="M2 2h12v2H2zm0 4h8v2H2zm0 4h10v2H2z"/></svg></div>
  <div><h1>ReadAloud Timer</h1><p>Page Reader &amp; Countdown</p></div>
</div>

<div class="main">

  <!-- LEFT: text -->
  <div class="left">
    <div class="left-label" id="areaLabel">貼上要朗讀的文字</div>
    <textarea id="textArea" placeholder="把要朗讀的文字貼在這裡…"></textarea>
    <div class="rdisplay" id="readingDisplay"></div>
  </div>

  <!-- RIGHT: controls -->
  <div class="right">

    <div>
      <div class="sect-label">統計</div>
      <div class="stats">
        <div class="stat"><span class="sv" id="sWords">—</span><span class="sl">Words</span></div>
        <div class="stat"><span class="sv" id="sMin">—</span><span class="sl">Min.</span></div>
        <div class="stat"><span class="sv" id="sChars">—</span><span class="sl">Chars</span></div>
      </div>
    </div>

    <hr>

    <div>
      <div class="sect-label">Voice Settings</div>
      <div class="ctrl-grid" style="margin-bottom:8px">
        <div class="ctrl-group"><label>Voice</label><select id="selVoice"><option value="">System default</option></select></div>
        <div class="ctrl-group"><label>Pitch</label>
          <select id="selPitch">
            <option value="0.8">Low</option>
            <option value="1.0" selected>Normal</option>
            <option value="1.2">High</option>
          </select>
        </div>
      </div>
      <div class="speed-row">
        <label>Speed</label>
        <input type="range" id="rSpeed" min="0.5" max="2.5" step="0.1" value="1.0">
        <span class="speed-val" id="spv">x1.0</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-play" id="bPlay" disabled>▶ Play</button>
      <button class="btn-pause" id="bPause" disabled>⏸ Pause</button>
      <button class="btn-stop" id="bStop" disabled>■ Stop</button>
    </div>

    <div class="timer" id="timer">
      <div class="timer-top"><span class="timer-label">Time remaining</span><span class="timer-end" id="tEnd"></span></div>
      <div class="timer-cd" id="tCd">0:00</div>
      <div class="timer-prog"><div class="timer-bar" id="tBar" style="width:100%"></div></div>
    </div>

    <div class="err" id="errMsg"></div>
    <div class="status"><div class="dot" id="dot"></div><span id="stxt">貼上文字後按 Play</span></div>

  </div>
</div>

<script>
const MAX_CHARS = 250;
const DEFAULT_WPM = 130;

let chunks = [], chunkWordOffsets = [], chunkWordArrays = [], wordEls = [];
let isPlaying = false, isPaused = false, stopped = false;
let totalSec = 0, remSec = 0, timerStartTs = null, tiv = null;
let currentHlIdx = -1;
let totalWords = 0, speechStartTs = null;

const $ = id => document.getElementById(id);
const fmt = s => Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
const endTime = s => 'ends '+new Date(Date.now()+s*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
function stat(cls,msg){$('dot').className='dot'+(cls?' '+cls:'');$('stxt').textContent=msg;}
function showErr(m){$('errMsg').textContent=m;$('errMsg').classList.add('on');}
function hideErr(){$('errMsg').classList.remove('on');}

function splitChunks(text){
  const sentences=text.match(/[^.!?\n]+[.!?\n]*/g)||[text];
  const result=[];let cur='';
  for(const s of sentences){
    if(cur.length+s.length>MAX_CHARS&&cur.length>0){result.push(cur.trim());cur=s;}
    else cur+=s;
  }
  if(cur.trim())result.push(cur.trim());
  return result;
}

function buildDisplay(text){
  const rd=$('readingDisplay');rd.innerHTML='';wordEls=[];
  text.split(/(\s+)/).forEach(tok=>{
    if(/^\s+$/.test(tok)) rd.appendChild(document.createTextNode(tok));
    else if(tok.length){
      const sp=document.createElement('span');
      sp.className='word';sp.textContent=tok;
      rd.appendChild(sp);wordEls.push(sp);
    }
  });
}

function buildOffsets(cks){
  const offsets=[];let idx=0;
  cks.forEach(c=>{offsets.push(idx);idx+=c.split(/\s+/).filter(Boolean).length;});
  return offsets;
}

function buildWordPositions(chunkText){
  const positions=[];
  const re=/\S+/g;let m;
  while((m=re.exec(chunkText))!==null)
    positions.push(m.index);
  return positions; // just start positions — simpler and more accurate
}

// Find which word charIndex belongs to: last word whose start <= charIndex
function findWordIdx(startPositions, ci){
  let best=0;
  for(let i=0;i<startPositions.length;i++){
    if(startPositions[i]<=ci) best=i; else break;
  }
  return best;
}

// Highlight only — no dimming past words
function hlWord(idx){
  if(idx===currentHlIdx||idx<0||idx>=wordEls.length) return;
  if(currentHlIdx>=0&&wordEls[currentHlIdx])
    wordEls[currentHlIdx].classList.remove('active');
  wordEls[idx].classList.add('active');
  wordEls[idx].scrollIntoView({block:'nearest',behavior:'smooth'});
  currentHlIdx=idx;
}

// Timer
function tick(){
  if(!isPlaying||isPaused) return;
  remSec=Math.max(0, totalSec-(Date.now()-timerStartTs)/1000);
  $('tCd').textContent=fmt(remSec);
  $('tBar').style.width=(totalSec>0?remSec/totalSec*100:0)+'%';
  if(remSec<=0) clearInterval(tiv);
}
function startTimer(s){
  clearInterval(tiv);totalSec=s;remSec=s;timerStartTs=Date.now();
  $('timer').classList.add('on');$('tEnd').textContent=endTime(s);
  tick();tiv=setInterval(tick,500);
}
function pauseTimer(){totalSec=remSec;clearInterval(tiv);tiv=null;}
function resumeTimer(){timerStartTs=Date.now();$('tEnd').textContent=endTime(remSec);tiv=setInterval(tick,500);}
function stopTimer(){clearInterval(tiv);tiv=null;$('timer').classList.remove('on');}

function recalibrateTimer(wordsSpokenSoFar){
  if(!speechStartTs||wordsSpokenSoFar<5) return;
  const elapsed=(Date.now()-speechStartTs)/1000;
  const realWpm=(wordsSpokenSoFar/elapsed)*60;
  if(realWpm<50||realWpm>400) return; // sanity check
  const wordsLeft=totalWords-wordsSpokenSoFar;
  const rate=parseFloat($('rSpeed').value);
  const newRem=Math.max(5,(wordsLeft/realWpm)*60);
  if(Math.abs(newRem-remSec)>8){
    totalSec=newRem;remSec=newRem;timerStartTs=Date.now();
    $('tEnd').textContent=endTime(newRem);
  }
}

function setIdle(msg){
  isPlaying=false;isPaused=false;stopped=true;currentHlIdx=-1;
  $('bPlay').disabled=($('textArea').value.trim().length===0);
  $('bPause').disabled=true;$('bStop').disabled=true;
  $('bPause').textContent='⏸ Pause';
  stat('',msg);stopTimer();
  $('readingDisplay').style.display='none';
  $('textArea').style.display='block';
  $('areaLabel').textContent='貼上要朗讀的文字';
}

function getVoice(){
  const n=$('selVoice').value;if(!n)return null;
  return speechSynthesis.getVoices().find(v=>v.name===n)||null;
}

function speakChunk(idx){
  if(stopped||idx>=chunks.length){
    if(!stopped){
      if(currentHlIdx>=0&&wordEls[currentHlIdx])
        wordEls[currentHlIdx].classList.remove('active');
      setTimeout(()=>setIdle('Done reading.'),300);
    }
    return;
  }

  const rate=parseFloat($('rSpeed').value);
  const pitch=parseFloat($('selPitch').value);
  const v=getVoice();
  const chunkText=chunks[idx];
  const globalOffset=chunkWordOffsets[idx];
  const startPositions=chunkWordArrays[idx];
  const chunkWordCount=startPositions.length;

  const utt=new SpeechSynthesisUtterance(chunkText);
  utt.rate=rate;utt.pitch=pitch;
  if(v){utt.voice=v;utt.lang=v.lang;}else{utt.lang='en-US';}

  let boundaryFired=false;
  let fallbackIv=null;
  let lastLocalIdx=-1;

  utt.onboundary=e=>{
    if(stopped||e.name!=='word') return;
    boundaryFired=true;
    if(fallbackIv){clearInterval(fallbackIv);fallbackIv=null;}
    const localIdx=findWordIdx(startPositions,e.charIndex);
    if(localIdx!==lastLocalIdx){
      lastLocalIdx=localIdx;
      const globalIdx=globalOffset+localIdx;
      hlWord(globalIdx);
      recalibrateTimer(globalIdx);
    }
  };

  utt.onstart=()=>{
    if(idx===0) speechStartTs=Date.now();
    hlWord(globalOffset);
    lastLocalIdx=0;
    // fallback if onboundary never fires
    setTimeout(()=>{
      if(!boundaryFired&&!stopped){
        let li=0;
        const ms=(60/DEFAULT_WPM/rate)*1000;
        fallbackIv=setInterval(()=>{
          if(stopped||isPaused)return;
          li++;
          if(li>=chunkWordCount){clearInterval(fallbackIv);fallbackIv=null;return;}
          hlWord(globalOffset+li);
        },ms);
      }
    },500);
  };

  utt.onend=()=>{
    if(fallbackIv){clearInterval(fallbackIv);fallbackIv=null;}
    if(!stopped) speakChunk(idx+1);
  };

  utt.onerror=e=>{
    if(fallbackIv){clearInterval(fallbackIv);fallbackIv=null;}
    if(e.error==='interrupted')return;
    showErr('TTS error: '+e.error);setIdle('Error.');
  };

  speechSynthesis.speak(utt);
}

function loadVoices(){
  const vs=speechSynthesis.getVoices();if(!vs.length)return;
  const sel=$('selVoice');
  sel.innerHTML='<option value="">System default</option>';
  vs.forEach(v=>{
    const o=document.createElement('option');
    o.value=v.name;
    o.textContent=v.name.replace(/Microsoft |Google /g,'')+' · '+v.lang;
    if(v.name==='Google UK English Male')o.selected=true;
    sel.appendChild(o);
  });
}
speechSynthesis.addEventListener('voiceschanged',loadVoices);
loadVoices();

$('rSpeed').addEventListener('input',()=>{$('spv').textContent='x'+parseFloat($('rSpeed').value).toFixed(1);});

function onTextChange(){
  const text=$('textArea').value.trim();
  if(!text){
    $('sWords').textContent='—';$('sMin').textContent='—';$('sChars').textContent='—';
    $('bPlay').disabled=true;stat('','貼上文字後按 Play');return;
  }
  const w=text.split(/\s+/).filter(Boolean).length,c=text.length;
  $('sWords').textContent=w>999?(w/1000).toFixed(1)+'k':w;
  $('sMin').textContent=Math.ceil(w/DEFAULT_WPM);
  $('sChars').textContent=c>999?(c/1000).toFixed(1)+'k':c;
  $('bPlay').disabled=false;hideErr();stat('','Ready · click Play');
}
const ta=$('textArea');
['input','change','keyup'].forEach(ev=>ta.addEventListener(ev,onTextChange));
ta.addEventListener('paste',()=>setTimeout(onTextChange,50));

$('bPlay').addEventListener('click',function(){
  const text=$('textArea').value.trim();
  if(!text){showErr('No text.');return;}
  hideErr();speechSynthesis.cancel();
  stopped=false;currentHlIdx=-1;speechStartTs=null;
  chunks=splitChunks(text);
  buildDisplay(text);
  chunkWordOffsets=buildOffsets(chunks);
  chunkWordArrays=chunks.map(c=>buildWordPositions(c));
  totalWords=text.split(/\s+/).filter(Boolean).length;
  $('textArea').style.display='none';
  $('readingDisplay').style.display='block';
  $('areaLabel').textContent='朗讀進度';
  isPlaying=true;isPaused=false;
  $('bPlay').disabled=true;$('bPause').disabled=false;$('bStop').disabled=false;
  stat('playing','Reading aloud…');
  const rate=parseFloat($('rSpeed').value);
  startTimer(Math.ceil(totalWords/(DEFAULT_WPM*rate)*60));
  speakChunk(0);
});

$('bPause').addEventListener('click',function(){
  if(!isPlaying)return;
  if(isPaused){
    speechSynthesis.resume();isPaused=false;$('bPause').textContent='⏸ Pause';
    stat('playing','Reading aloud…');resumeTimer();
  }else{
    speechSynthesis.pause();isPaused=true;$('bPause').textContent='▶ Resume';
    stat('paused','Paused.');pauseTimer();
  }
});

$('bStop').addEventListener('click',function(){
  stopped=true;speechSynthesis.cancel();setIdle('Stopped.');
});
</script>
</body>
</html>
